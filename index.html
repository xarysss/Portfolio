<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>~/titouan.dev/profile.ts</title>
    <meta
      name="description"
      content="Portfolio terminal de Titouan Mouysset, etudiant en BUT Reseaux & Telecommunications, specialite DevCloud."
    />
    <meta name="theme-color" content="#272822" />
    <meta property="og:title" content="Titouan Mouysset - Portfolio" />
    <meta
      property="og:description"
      content="Reseaux, systemes, DevCloud, automatisation et projets web."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://cdn.rawgit.com" />
    <link
      rel="stylesheet"
      href="https://cdn.rawgit.com/tonsky/FiraCode/1.204/distr/fira_code.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="step-0 theme-monokai lang-ts">
    <noscript>Active JavaScript pour voir le portfolio.</noscript>

    <div class="loader" id="loader" aria-label="Chargement du portfolio">
      <div class="line shell-line">
        <span>Last login: <span id="loader-now"></span> on ttys007</span>
      </div>
      <div class="line shell-line">
        <span class="path">~/titouan.dev</span>
        <span class="branch"> main</span>
        <span class="command"></span>
        <span class="args-space"></span>
        <span class="args"></span>
      </div>
    </div>

    <main id="root" class="hidden" aria-live="polite">
      <div class="command-line line">
        <span class="path">~/titouan.dev</span>
        <span class="branch"> main</span>
        <span class="command">cat</span>
        <span class="space"></span>
        <button class="selectable active" type="button" data-lang="ts">profile.ts</button>
        <span class="collapsible">
          <span class="white-space"> | </span>
          <button class="selectable" type="button" data-lang="yaml">profile.yml</button>
          <span class="white-space"> | </span>
          <button class="selectable" type="button" data-lang="sh">contact.sh</button>
        </span>
        <span class="white-space"> </span>
        <button class="theme-toggle" id="theme-toggle" type="button" title="Changer de theme">
          theme
        </button>
      </div>

      <section class="code-window" id="code"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
